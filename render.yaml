services:
  - type: web
    name: movie-god
    runtime: node
    plan: free
    repo: https://github.com/juyeon0303/movie_god
    branch: master
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: OMDB_API_KEY
        sync: false
      - key: TMDB_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false

  - type: cron
    name: movie-god-sync
    runtime: node
    schedule: "0 3 * * *"
    buildCommand: npm install --include=dev
    startCommand: npm run sync:tiers
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: OMDB_API_KEY
        sync: false
      - key: TMDB_API_KEY
        sync: false
