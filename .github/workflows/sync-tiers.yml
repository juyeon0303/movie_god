name: Sync OTT Tier Snapshots

on:
  schedule:
    # 매일 12:00 KST (03:00 UTC)
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CI: true

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Build tier snapshots + RAG embeddings
        run: npm run sync:tiers
        env:
          OMDB_API_KEY: ${{ secrets.OMDB_API_KEY }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          USE_PGVECTOR: ${{ secrets.USE_PGVECTOR }}

      - name: Commit snapshots and embeddings to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/snapshots/ data/embeddings/ data/lee-dongjin/
          if git diff --staged --quiet; then
            echo "No snapshot changes to commit"
          else
            git commit -m "chore: daily tier snapshot + RAG embedding sync"
            git push
          fi
