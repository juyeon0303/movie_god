name: Sync Lee Dong-jin Ratings (Weekly)

on:
  schedule:
    - cron: "0 4 * * 0"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ldj:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm

      - run: npm ci --include=dev

      - name: Fetch full Lee Dong-jin ratings
        run: npm run sync:ldj

      - name: Commit ratings
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/lee-dongjin/
          git diff --staged --quiet || git commit -m "chore: weekly lee-dongjin ratings sync"
          git diff --staged --quiet || git push
